[params]
  # color style
  color = 'linen'                           

  # header social icons
  twitter = '@__ashfaaq__'              
  github = 'Ashfaaq98'                 
  linkedin = 'Ashfaaq98'             

  # home page profile
  avatar = '/images/ashfaaq.png'                 
  name = 'Ashfaaq Farzaan'
  bio = 'AI Engineer & Security Researcher building intelligent, autonomous systems to defend the next generation of digital infrastructure.'

  # misc
  disableHLJS = true                        # disable highlight.js
  disablePostNavigation = true              # disable post navigation
  monoDarkIcon = true                       # show monochrome dark mode icon
  gravatarCdn = 'GRAVATAR_CDN_LINK'         # e.g. 'https://cdn.v2ex.com/gravatar/'
  math = true                               # enable KaTeX math typesetting globally
  localKatex = false                        # use local KaTeX js/css instead of CDN
  favicon = "favicon.ico"                   # customize the default favicon
  appleTouchIcon = "apple-touch-icon.png"   # customize the default Apple touch icon

[params.HugoShortcodes.BuyMeACoffee]
  Slug        = "qaafhsa"
  Text        = "Buy me a coffee"
  ButtonColor = "ffdd00"
  FontColor   = "000000"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

